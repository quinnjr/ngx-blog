<div>
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Settings</h1>

  <div class="space-y-6">
    <!-- General Settings -->
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">General Settings</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Site Title</label>
          <input
            type="text"
            value="NGX Blog CMS"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Site Description</label>
          <textarea
            rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
A modern Angular-based blogging platform</textarea
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Site URL</label>
          <input
            type="url"
            value="https://example.com"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>
    </div>

    <!-- SEO Settings -->
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">SEO Settings</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Default Meta Description</label
          >
          <textarea
            rows="2"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
A modern Angular-based blogging platform with powerful customization</textarea
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Meta Keywords</label>
          <input
            type="text"
            value="angular, blog, cms, typescript"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div class="flex items-center">
          <input
            type="checkbox"
            id="sitemap"
            checked
            class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
          />
          <label for="sitemap" class="ml-2 block text-sm text-gray-700"> Generate Sitemap </label>
        </div>
      </div>
    </div>

    <!-- Social Media -->
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">Social Media</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Twitter Handle</label>
          <input
            type="text"
            placeholder="@yourblog"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Facebook Page</label>
          <input
            type="url"
            placeholder="https://facebook.com/yourblog"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">GitHub Repository</label>
          <input
            type="url"
            placeholder="https://github.com/yourblog"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>
    </div>

    <div class="flex justify-end">
      <button
        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors"
      >
        Save Settings
      </button>
    </div>
  </div>
</div>
