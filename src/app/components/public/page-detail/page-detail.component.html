@if (page(); as page) {
  <article class="py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Title -->
      <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-6">
        {{ page.title }}
      </h1>

      <!-- Meta Information -->
      @if (page.publishedAt) {
        <p class="text-gray-500 mb-8 pb-8 border-b">
          Last updated: {{ formatDate(page.updatedAt) }}
        </p>
      }

      <!-- Featured Image -->
      @if (page.featuredImage) {
        <img
          [src]="page.featuredImage"
          [alt]="page.title"
          class="w-full rounded-lg shadow-lg mb-8"
        />
      }

      <!-- Content -->
      <div class="prose prose-lg max-w-none" [innerHTML]="page.content"></div>
    </div>
  </article>
} @else {
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 text-center">
    <h1 class="text-3xl font-bold text-gray-900 mb-4">Page Not Found</h1>
    <p class="text-gray-600 mb-8">The page you're looking for doesn't exist.</p>
    <a routerLink="/" class="text-blue-600 hover:text-blue-800 font-medium"> ← Back to Home </a>
  </div>
}
