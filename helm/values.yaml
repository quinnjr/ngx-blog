# Default values for ngx-blog

replicaCount: 3

image:
  repository: your-registry/ngx-blog
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 4000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: blog.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ngx-blog-tls
      hosts:
        - blog.example.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration
config:
  port: 4000
  nodeEnv: production
  allowedOrigins: "https://blog.example.com"

# Secrets (use external secrets manager in production)
secrets:
  databaseUrl: "postgresql://user:pass@postgres:5432/ngx_blog"
  jwtSecret: "change-this-in-production"

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    username: ngx_user
    password: changeme
    database: ngx_blog
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m

# Redis configuration (optional)
redis:
  enabled: false
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
